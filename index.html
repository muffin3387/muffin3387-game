<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>由社会爱好者制作</title>

<style>

body{
  background:radial-gradient(circle,#d10000,#7a0000);
  margin:0;
  overflow:hidden;
  font-family:"Yu Gothic","MS Gothic",sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:background 0.2s;
}

/* ===== 開始画面 ===== */

#startScreen{
  position:fixed;
  inset:0;
  background:#8b0000;
  color:#ffd700;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  z-index:9999;
}

#startText{
  font-size:64px;
  letter-spacing:4px;
  animation:blink 1s infinite;
}

#subText{
  margin-top:20px;
  font-size:28px;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.4;}
  100%{opacity:1;}
}

/* ===== OP ===== */

#center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  opacity:1;
}

#monkey{
  font-size:120px;
  opacity:0;
  color:#ffd700;
}

#title{
  font-size:42px;
  letter-spacing:5px;
  margin-top:10px;
  opacity:0;
  transform:translateY(40px);
  color:#ffd700;
}

.appear{
  animation:monkeyAppear 1s forwards;
}

@keyframes monkeyAppear{

  0%{
    opacity:0;
    transform:scale(0.5);
  }

  70%{
    opacity:1;
    transform:scale(1.1);
  }

  100%{
    opacity:1;
    transform:scale(1);
  }
}

.showText{
  animation:titleRise 1.6s forwards;
}

@keyframes titleRise{

  0%{
    opacity:0;
    transform:translateY(40px);
  }

  100%{
    opacity:1;
    transform:translateY(0px);
  }
}

.fadeMove{
  animation:fadeMove 2s forwards;
}

@keyframes fadeMove{

  0%{
    opacity:1;
    transform:translate(-50%,-50%);
  }

  100%{
    opacity:0;
    transform:translate(-50%,-70%);
  }
}

/* ===== クイズ ===== */

#quizContainer{
  display:none;
  background:rgba(0,0,0,0.82);
  border:2px solid #ffd700;
  box-shadow:0 0 25px #ffd700;
  border-radius:12px;
  padding:30px;
  width:700px;
  max-width:90%;
  text-align:center;
  opacity:0;
  transition:opacity 1s;
  min-height:650px;
  position:relative;
}

#quizContainer.show{
  opacity:1;
}

#questionContainer{
  margin-top:20px;
  min-height:420px;
  font-size:22px;
}

.choice,
button{
  display:block;
  margin:10px auto;
  width:260px;
  padding:10px;
  font-size:18px;
  background:#111;
  color:#ffd700;
  border:2px solid #ffd700;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.choice:hover{
  background:#ffd700;
  color:black;
  transform:scale(1.05);
}

input[type=text]{
  margin:10px auto;
  display:block;
  width:260px;
  padding:10px;
  font-size:18px;
  background:#111;
  color:#ffd700;
  border:2px solid #ffd700;
}

.correct{
  color:#00ff66;
  font-weight:bold;
  font-size:28px;
}

.incorrect{
  color:#ff4444;
  font-weight:bold;
  font-size:24px;
}

#answerFeedback{
  position:absolute;
  bottom:20px;
  left:0;
  width:100%;
  min-height:80px;
}

/* ===== タイマー ===== */

#timerBarContainer{
  width:100%;
  height:18px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
  margin-bottom:20px;
}

#timerBar{
  height:100%;
  width:100%;
  background:linear-gradient(
    90deg,
    #ffd700,
    #ff4444
  );
  transition:width 0.1s linear;
}

/* ===== 残り少ない時 ===== */

.flash{
  animation:flashScreen 0.3s infinite;
}

@keyframes flashScreen{

  0%{
    background:#7a0000;
  }

  50%{
    background:#ff0000;
  }

  100%{
    background:#7a0000;
  }
}

</style>

/* =========================
   出題設定
========================= */

const QUIZ_COUNTS = {
  基礎:5,
  普通:20,
  難関:15,
  超難関:10,
};

/* =========================
   変数
========================= */

let currentIndex = 0;
let correctCount = 0;

let timer;
let timeLeft;
let isAnswering = false;

let activeQuiz = [];

/* =========================
   シャッフル
========================= */

function shuffleArray(array){

  for(let i=array.length-1;i>0;i--){

    const j =
      Math.floor(
        Math.random()*(i+1)
      );

    [array[i],array[j]]
    =
    [array[j],array[i]];
  }

  return array;
}

/* =========================
   ランダム抽選
========================= */

function buildQuizSet(){

  const result = [];

  Object.keys(QUIZ_COUNTS)
  .forEach(level=>{

    const filtered =
      quizData.filter(
        q=>q.difficulty===level
      );

    shuffleArray(filtered);

    const picked =
      filtered.slice(
        0,
        QUIZ_COUNTS[level]
      );

    result.push(...picked);

  });

  shuffleArray(result);

  return result;
}

/* =========================
   初期化
========================= */

function initQuiz(){

  currentIndex = 0;
  correctCount = 0;

  activeQuiz =
    buildQuizSet();

  showQuestion();
}

/* =========================
   タイマー
========================= */

function startTimer(duration){

  clearInterval(timer);

  timeLeft = duration;

  const bar =
    document.getElementById(
      "timerBar"
    );

  bar.style.width = "100%";

  timer = setInterval(()=>{

    timeLeft -= 0.1;

    if(timeLeft < 0)
      timeLeft = 0;

    bar.style.width =
      (timeLeft / duration * 100)
      + "%";

    if(timeLeft <= 3){

      document.body
      .classList.add("flash");
    }

    else{

      document.body
      .classList.remove("flash");
    }

    if(timeLeft <= 0){

      clearInterval(timer);

      document.body
      .classList.remove("flash");

      showFeedback(false,true);
    }

  },100);
}

/* =========================
   問題表示
========================= */

function showQuestion(){

  isAnswering = true;

  const q =
    activeQuiz[currentIndex];

  const container =
    document.getElementById(
      "questionContainer"
    );

  const feedback =
    document.getElementById(
      "answerFeedback"
    );

  container.innerHTML = "";
  feedback.innerHTML = "";

  const title =
    document.createElement("div");

  title.innerHTML = `

  <div style="
    margin-bottom:20px;
    color:#ffd700;
    font-size:20px;
  ">

    ${currentIndex+1}
    /
    ${activeQuiz.length}

  </div>

  <div style="
  font-size:24px;
  margin-bottom:25px;
  padding:10px 15px;
  border:1px solid rgba(255,215,0,0.4);
  border-radius:8px;
  line-height:1.6;
  word-break:break-word;
">
  
  ${q.question}

  </div>

  `;

  container.appendChild(title);

  if(q.type === "fill"){

    startTimer(15);

  }else{

    startTimer(10);
  }

  /* ===== 単一選択 ===== */

  if(q.type==="single"){

    q.options.forEach(opt=>{

      const btn =
        document.createElement("button");

      btn.className="choice";
      btn.textContent=opt;

      btn.onclick=()=>{

        checkAnswer(opt);
      };

      container.appendChild(btn);

    });
  }

  /* ===== ○× ===== */

  else if(q.type==="boolean"){

    const maru =
      document.createElement("button");

    maru.className="choice";
    maru.textContent="〇";

    maru.onclick=()=>{

      checkAnswer(true);
    };

    const batsu =
      document.createElement("button");

    batsu.className="choice";
    batsu.textContent="×";

    batsu.onclick=()=>{

      checkAnswer(false);
    };

    container.appendChild(maru);
    container.appendChild(batsu);
  }

  /* ===== 複数 ===== */

  else if(q.type==="multiple"){

    q.options.forEach(opt=>{

      const label =
        document.createElement("label");

      label.className="choice";

      const cb =
        document.createElement("input");

      cb.type="checkbox";
      cb.value=opt;

      label.appendChild(cb);

      label.appendChild(
        document.createTextNode(opt)
      );

      container.appendChild(label);

    });

    const btn =
      document.createElement("button");

    btn.textContent="回答";

    btn.onclick=()=>{

      checkAnswer();
    };

    container.appendChild(btn);
  }

  /* ===== 記述 ===== */

  else if(q.type==="fill"){

    const input =
      document.createElement("input");

    input.type="text";
    input.id="fillInput";

    container.appendChild(input);

    const btn =
      document.createElement("button");

    btn.textContent="回答";

    btn.onclick=()=>{

      checkAnswer(
        document
        .getElementById("fillInput")
        .value
      );

    };

    container.appendChild(btn);
  }
}

/* =========================
   判定
========================= */

function checkAnswer(selected){

  if(!isAnswering)
    return;

  isAnswering = false;

  clearInterval(timer);

  document.body
  .classList.remove("flash");

  const q =
    activeQuiz[currentIndex];

  let correct = false;

  if(q.type==="single"){

    correct =
      selected===q.answer;
  }

  else if(q.type==="boolean"){

    correct =
      selected===q.answer;
  }

  else if(q.type==="multiple"){

    const checkboxes =
      Array.from(
        document.querySelectorAll(
          '#questionContainer input[type=checkbox]'
        )
      );

    const checked =
      checkboxes
      .filter(cb=>cb.checked)
      .map(cb=>cb.value);

    correct =
      JSON.stringify(checked.sort())
      ===
      JSON.stringify(q.answer.sort());
  }

  else if(q.type==="fill"){

    correct =
      selected.trim()===q.answer;
  }

  showFeedback(correct);
}

/* =========================
   フィードバック
========================= */

function showFeedback(correct,timeup=false){

  const feedback =
    document.getElementById(
      "answerFeedback"
    );

  if(correct){

    correctCount++;

    feedback.innerHTML =
      `<div class="correct">
        正解！
      </div>`;
  }

else{

  feedback.innerHTML =
    `<div class="incorrect">
      ${timeup ? '時間切れ！' : '不正解！'}
    </div>`;
}

  setTimeout(()=>{

    currentIndex++;

    if(currentIndex >= activeQuiz.length){

      showRank();
    }

    else{

      showQuestion();
    }

  },1500);
}

/* =========================
   ランク
========================= */

function showRank(){

  clearInterval(timer);

  document.body
  .classList.remove("flash");

  const container =
    document.getElementById(
      "questionContainer"
    );

  const feedback =
    document.getElementById(
      "answerFeedback"
    );

  let rank = "D";

  const p =
    correctCount / activeQuiz.length;

  if(p >= 0.95)
    rank = "S";

  else if(p >= 0.85)
    rank = "A";

  else if(p >= 0.7)
    rank = "B";

  else if(p >= 0.5)
    rank = "C";

  else if(p >= 0.3)
    rank = "D";

  container.innerHTML = `

  <div style="font-size:32px;">

    正解数:
    ${correctCount}
    /
    ${activeQuiz.length}

  </div>

  <div style="
    margin-top:20px;
    font-size:60px;
    color:#ffd700;
  ">

    ${rank}

  </div>

  <div style="
    margin-top:30px;
    font-size:24px;
    color:#ffd700;
    animation:blink 1s infinite;
  ">

    PRESS Q TO RESTART

  </div>

  `;

  feedback.innerHTML = "";

}

/* =========================
   リスタート
========================= */

document.addEventListener("keydown",(e)=>{

  if(e.key==="q" || e.key==="Q"){

    location.reload();

  }

});

</script>
